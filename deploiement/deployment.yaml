apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube-m02
      containers:
      - name: devops-app
        image: labnoujsiham/devops-app:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "db"
        - name: DB_NAME
          value: "gestion_reclamations"
        - name: DB_USER
          value: "devops_user"
        - name: DB_PASS
          value: "devops_pass"